# render.yaml — Add to your repo root or alongside existing render config
#
# This deploys the PDF service as a separate Render web service.
# Alternatively, add the pdfService.js route to your existing server.js.
#
# IMPORTANT: @sparticuz/chromium bundles a pre-built Chromium binary
# that works in serverless/containerised environments without system Chrome.
# Memory: PDF generation needs ~512MB minimum; set to 1GB for headroom.

services:
  - type: web
    name: garden-calendar-pdf
    env: node
    plan: starter          # 512MB — upgrade to standard (1GB) if OOM errors
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
    # Health check — Render pings this to verify the service is up
    healthCheckPath: /health
    # Auto-deploy on push to main
    autoDeploy: true
